# Категории глоссария проекта.
# id (ключ) — значение для поля label в replacements.yaml; stable, snake_case, не меняется.
# title — человекочитаемый заголовок для UI.
# description — что включает категория (опционально).
categories:
  brand_product:
    title: Бренд / продукт
    description: Названия компаний, продуктов, технологий
  person:
    title: Имя
    description: Имена собственные людей
  team:
    title: Команда
    description: Названия команд, ролей, подразделений
  tech_term:
    title: Технический термин
    description: Термины предметной области, подвод к канонической форме
  linguistic:
    title: Лингвистический
    description: Нормализация написания (не терминология), например «Самри» -> «Саммари»
  project_specific:
    title: Проектно-специфичный
    description: Термины и названия, уникальные для данного проекта
  it_slang:
    title: IT-жаргон
    description: Разговорные IT-термины, жаргонизмы, кальки
